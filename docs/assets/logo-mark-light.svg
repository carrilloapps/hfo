<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="hfo">
  <title>hfo</title>
  <desc>Light-on-dark variant of the hfo mark: a dark rounded square with three connected nodes representing the Hugging Face, file, and Ollama stages of the pipeline.</desc>
  <rect x="1" y="1" width="30" height="30" rx="7" fill="#0a0b0f"/>
  <line x1="8" y1="16" x2="24" y2="16" stroke="#e7ecf3" stroke-width="2" stroke-linecap="round"/>
  <circle cx="8"  cy="16" r="3" fill="#e7ecf3"/>
  <circle cx="16" cy="16" r="3" fill="none" stroke="#e7ecf3" stroke-width="2"/>
  <circle cx="24" cy="16" r="3" fill="#e7ecf3"/>
</svg>

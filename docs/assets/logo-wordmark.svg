<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 84 32" role="img" aria-label="hfo logo">
  <title>hfo</title>
  <desc>The hfo wordmark: a blue-to-violet gradient mark followed by the lowercase letters h, f and o in bold monospace rendered in the mark's primary color so the wordmark remains legible on both light and dark backgrounds.</desc>
  <defs>
    <linearGradient id="hfo-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#3B6FE5"/>
      <stop offset="0.55" stop-color="#5B6BE5"/>
      <stop offset="1"   stop-color="#7C5BF3"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="30" height="30" rx="7" fill="url(#hfo-grad)"/>
  <line x1="8" y1="16" x2="24" y2="16" stroke="#0a0b0f" stroke-width="2" stroke-linecap="round"/>
  <circle cx="8"  cy="16" r="3" fill="#0a0b0f"/>
  <circle cx="16" cy="16" r="3" fill="none" stroke="#0a0b0f" stroke-width="2"/>
  <circle cx="24" cy="16" r="3" fill="#0a0b0f"/>
  <text x="40" y="23" font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace" font-size="20" font-weight="700" letter-spacing="-0.5" fill="#5B6BE5">hfo</text>
</svg>

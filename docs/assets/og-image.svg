<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="hfo — Hugging Face · Ollama, in your terminal">
  <title>hfo — Hugging Face · Ollama, in your terminal</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#0a0b0f"/>
      <stop offset="1"   stop-color="#11131a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#6cb6ff"/>
      <stop offset="1"   stop-color="#c6aaff"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#1a1d26" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.6"/>

  <!-- Large mark -->
  <g transform="translate(120, 175)">
    <rect x="0" y="0" width="280" height="280" rx="56" fill="url(#accent)"/>
    <line x1="70"  y1="140" x2="210" y2="140" stroke="#0a0b0f" stroke-width="14" stroke-linecap="round"/>
    <circle cx="70"  cy="140" r="22" fill="#0a0b0f"/>
    <circle cx="140" cy="140" r="22" fill="none" stroke="#0a0b0f" stroke-width="14"/>
    <circle cx="210" cy="140" r="22" fill="#0a0b0f"/>
  </g>

  <!-- Wordmark + tagline -->
  <g transform="translate(480, 230)">
    <text x="0" y="0" font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace" font-size="140" font-weight="800" letter-spacing="-6" fill="#e7ecf3">hfo</text>
    <text x="0" y="70" font-family="ui-sans-serif, 'Inter', 'Segoe UI', Roboto, sans-serif" font-size="34" font-weight="500" fill="#8a92a5">Hugging Face · Ollama,</text>
    <text x="0" y="115" font-family="ui-sans-serif, 'Inter', 'Segoe UI', Roboto, sans-serif" font-size="34" font-weight="500" fill="#8a92a5">in your terminal.</text>
    <text x="0" y="195" font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace" font-size="22" font-weight="500" fill="#6cb6ff">$ npm i -g hfo-cli</text>
  </g>

  <!-- Footer attribution -->
  <text x="120" y="585" font-family="ui-sans-serif, 'Inter', sans-serif" font-size="22" font-weight="500" fill="#60677a">MIT · José Carrillo · hfo.carrillo.app</text>
</svg>

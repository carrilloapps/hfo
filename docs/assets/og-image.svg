<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="hfo — Hugging Face · Ollama, in your terminal">
  <title>hfo — Hugging Face · Ollama, in your terminal</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0b0f"/>
      <stop offset="1" stop-color="#141722"/>
    </linearGradient>
    <linearGradient id="mark-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"    stop-color="#3B6FE5"/>
      <stop offset="0.55" stop-color="#5B6BE5"/>
      <stop offset="1"    stop-color="#7C5BF3"/>
    </linearGradient>
    <linearGradient id="headline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"    stop-color="#ffffff"/>
      <stop offset="0.5"  stop-color="#e8e5ff"/>
      <stop offset="1"    stop-color="#A78BFA"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0"   stop-color="#5B6BE5" stop-opacity="0.30"/>
      <stop offset="1"   stop-color="#5B6BE5" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1d2230" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.35"/>

  <!-- Ambient glow behind the headline -->
  <ellipse cx="430" cy="300" rx="520" ry="320" fill="url(#glow)"/>

  <!-- Header: mark + brand + version -->
  <g transform="translate(72, 72)">
    <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#mark-grad)"/>
    <line x1="16" y1="32" x2="48" y2="32" stroke="#0a0b0f" stroke-width="3" stroke-linecap="round"/>
    <circle cx="16" cy="32" r="5" fill="#0a0b0f"/>
    <circle cx="32" cy="32" r="5" fill="none" stroke="#0a0b0f" stroke-width="3"/>
    <circle cx="48" cy="32" r="5" fill="#0a0b0f"/>
    <text x="84" y="47" font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace" font-size="36" font-weight="700" fill="#e7ecf3" letter-spacing="-1.2">hfo</text>
    <text x="168" y="45" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="500" fill="#8a92a5">v0.1.0</text>
  </g>

  <!-- Headline: sized to fit comfortably within the full width -->
  <g transform="translate(72, 0)">
    <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, 'Helvetica Neue', sans-serif" font-size="74" font-weight="800" fill="url(#headline)" letter-spacing="-2.4">
      <tspan x="0" y="260">Hugging Face · Ollama,</tspan>
      <tspan x="0" y="352">in your terminal.</tspan>
    </text>
  </g>

  <!-- Tagline under the headline -->
  <text x="72" y="414" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="500" fill="#8a92a5" letter-spacing="-0.3">
    Fullscreen TUI + headless CLI.  Hardware-tuned.  Cross-OS.  Free.
  </text>

  <!-- Install pill -->
  <g transform="translate(72, 480)">
    <rect x="0" y="0" width="370" height="58" rx="10" fill="#171922" stroke="#2b3246" stroke-width="1.5"/>
    <text x="22" y="38" font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace" font-size="20" font-weight="600" fill="#A78BFA">$ npm i -g hfo-cli</text>
  </g>

  <!-- Footer credit: left = license/author, right = URL -->
  <text x="72"   y="590" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="500" fill="#60677a">MIT · José Carrillo</text>
  <text x="1128" y="590" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', monospace" font-size="16" font-weight="600" fill="#8a92a5">hfo.carrillo.app</text>
</svg>

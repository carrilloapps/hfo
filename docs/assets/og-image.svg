<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="hfo — Hugging Face · Ollama, in your terminal">
  <title>hfo — Hugging Face · Ollama, in your terminal</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0b0f"/>
      <stop offset="1" stop-color="#141722"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#6cb6ff"/>
      <stop offset="0.5" stop-color="#a692ff"/>
      <stop offset="1"   stop-color="#c6aaff"/>
    </linearGradient>
    <linearGradient id="headline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#ffffff"/>
      <stop offset="0.6" stop-color="#ffffff"/>
      <stop offset="1"   stop-color="#c6aaff"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0"   stop-color="#6cb6ff" stop-opacity="0.35"/>
      <stop offset="1"   stop-color="#6cb6ff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1d2230" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.4"/>

  <!-- Subtle accent glow behind headline -->
  <ellipse cx="300" cy="315" rx="380" ry="280" fill="url(#glow)"/>

  <!-- Header row: small mark + brand wordmark -->
  <g transform="translate(72, 72)">
    <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#accent)"/>
    <line x1="16" y1="32" x2="48" y2="32" stroke="#0a0b0f" stroke-width="3" stroke-linecap="round"/>
    <circle cx="16" cy="32" r="5" fill="#0a0b0f"/>
    <circle cx="32" cy="32" r="5" fill="none" stroke="#0a0b0f" stroke-width="3"/>
    <circle cx="48" cy="32" r="5" fill="#0a0b0f"/>
    <text x="84" y="47" font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace" font-size="36" font-weight="700" fill="#e7ecf3" letter-spacing="-1.2">hfo</text>
    <text x="168" y="44" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="500" fill="#8a92a5">v0.1.0</text>
  </g>

  <!-- Headline -->
  <text x="72" y="290" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif" font-size="88" font-weight="800" fill="url(#headline)" letter-spacing="-3">
    <tspan x="72" dy="0">Hugging Face + Ollama,</tspan>
    <tspan x="72" dy="100">in your terminal.</tspan>
  </text>

  <!-- Tagline -->
  <text x="72" y="468" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="500" fill="#8a92a5" letter-spacing="-0.4">
    Fullscreen TUI + headless CLI. Hardware-tuned. Cross-OS. Free.
  </text>

  <!-- Install pill -->
  <g transform="translate(72, 500)">
    <rect x="0" y="0" width="370" height="58" rx="10" fill="#17192280" stroke="#262a35" stroke-width="1.5"/>
    <text x="22" y="38" font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace" font-size="20" font-weight="600" fill="#6cb6ff">$ npm i -g hfo-cli</text>
  </g>

  <!-- Right-side decorative: three flow nodes with big stroke -->
  <g transform="translate(820, 255)" opacity="0.9">
    <line x1="0"   y1="60" x2="240" y2="60" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
    <circle cx="0"   cy="60" r="26" fill="#0a0b0f" stroke="url(#accent)" stroke-width="4"/>
    <circle cx="0"   cy="60" r="11" fill="url(#accent)"/>
    <circle cx="120" cy="60" r="26" fill="#0a0b0f" stroke="url(#accent)" stroke-width="4"/>
    <circle cx="120" cy="60" r="11" fill="none" stroke="url(#accent)" stroke-width="4"/>
    <circle cx="240" cy="60" r="26" fill="#0a0b0f" stroke="url(#accent)" stroke-width="4"/>
    <circle cx="240" cy="60" r="11" fill="url(#accent)"/>
    <text x="0"   y="122" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="600" fill="#8a92a5">Hugging Face</text>
    <text x="120" y="122" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="600" fill="#8a92a5">Modelfile</text>
    <text x="240" y="122" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="600" fill="#8a92a5">Ollama</text>
  </g>

  <!-- Footer: credit -->
  <g transform="translate(72, 586)">
    <text x="0" y="0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="500" fill="#60677a">MIT</text>
    <circle cx="42" cy="-5" r="2" fill="#60677a"/>
    <text x="54" y="0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="500" fill="#60677a">José Carrillo</text>
    <circle cx="178" cy="-5" r="2" fill="#60677a"/>
    <text x="190" y="0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="600" fill="#8a92a5">hfo.carrillo.app</text>
  </g>
</svg>
